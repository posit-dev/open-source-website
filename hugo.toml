baseURL = 'https://posit-open-source.netlify.app'
languageCode = 'en-us'
title = 'Posit Open Source'
ignoreFiles = ['\.qmd$', '\.ipynb$', '\.Rmd$', '\.Rmarkdown$', 'CLAUDE\.md$', '_porting-notes\.md$', '_editing-ported-posts\.md$', '_link-checks\.md$', '_authoring-guide\.md$', '_external-sources', 'blog/.*/renv/', 'renv\.lock$', '\.Rprofile$', '_metadata\.yml$', '\.bib$', 'shinychat-tool-ui/feature/', '\.venv/', 'uv\.lock$', 'pyproject\.toml$', '\.quarto/', '_extensions/', '_quarto\.yml$', '_lychee/', '\.original$']

[pagination]
pagerSize = 50

[params]
subtitle = ""
showReadingTime = false

[taxonomies]
  tag = 'tags'
  category = 'categories'
  person = 'people'
  software = 'software'
  languages = 'languages'
  event = 'events'
  resource = 'resources'

[outputFormats.CardIndex]
  mediaType = "application/json"
  baseName = "card-index"
  isPlainText = true
  notAlternative = true

[outputs]
  home = ['html']
  section = ['html', 'CardIndex']
  taxonomy = ['html', 'CardIndex']
  term = ['html']
  page = ['html']

[services]
  [services.rss]
    limit = 20

[markup]

[markup.tableOfContents]
  startLevel = 2
  endLevel = 3
  ordered = false

[markup.highlight]
  lineNos = true
  noClasses = false

[markup.goldmark.renderer]
unsafe = true

[menu]
  [[menu.main]]
    name = 'Software'
    url = '/software/'
    weight = 2
  [[menu.main]]
    name = 'People'
    url = '/people/'
    weight = 3
  [[menu.main]]
    name = 'Events'
    url = '/events/'
    weight = 4
  [[menu.main]]
    name = 'Resources'
    url = '/resources/'
    weight = 5
  [[menu.main]]
    name = 'Blog'
    url = '/blog/'
    weight = 6
  [[menu.main]]
    name = 'About'
    url = '/about/'
    weight = 7
