sort:
  - key: date
    label: Date
    type: date
    direction: desc
    default: true
  - key: title
    label: Title
    type: string
    direction: asc
defaultSort: date
filters:
  - key: categories
    label: Topics
    logic: or
  - key: languages
    label: Languages
    logic: or
    values:
      - Python
      - R
      - Other
    other:
      - Python
      - R
