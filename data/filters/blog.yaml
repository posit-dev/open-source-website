sort:
  - key: date
    label: Date
    type: date
    direction: desc
    default: true
  - key: title
    label: Title
    type: string
    direction: asc
defaultSort: date
filters:
  - key: categories
    label: Topics
    logic: or
    values:
      - Machine Learning
      - Artificial Intelligence
      - Visualization
      - Interactive Apps
      - Publishing
      - MLOps and Admin
      - Data Wrangling
      - Best Practices
      - Community
  - key: languages
    label: Languages
    logic: or
    values:
      - Python
      - R
      - SQL
      - Rust
      - JavaScript
      - Other
    aliases:
      JavaScript:
        - JavaScript
        - TypeScript
    other:
      - Python
      - R
      - SQL
      - Rust
      - JavaScript
      - TypeScript
