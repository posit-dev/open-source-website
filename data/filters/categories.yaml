sort:
  - key: date
    label: Date
    type: date
    direction: desc
    default: true
  - key: title
    label: Title
    type: string
    direction: asc
defaultSort: date
filters:
  - key: type
    label: Type
    logic: or
    values:
      - blog post
      - software
      - event
      - video
      - cheatsheet
