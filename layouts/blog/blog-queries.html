{{ define "main" }}
<div class="flex flex-col w-full max-w-7xl mx-auto" data-pagefind-ignore>
  <h1 class="text-4xl font-medium text-gray-500 mb-2">Blog search</h1>

  <div class="prose mb-6">
    <p>Browse blog posts by topic:</p>
  </div>

  <div class="flex flex-wrap gap-2">
    {{ range .Sections }}
      <a href="{{ .RelPermalink }}" class="pill-link text-base">{{ .Params.query }}</a>
    {{ end }}
  </div>

  <div class="mt-6">
    {{ partial "button.html" (dict "url" "/blog/" "text" "Back to all blog posts" "icon-left" "boxicons--arrow-left") }}
  </div>
</div>
{{ end }}
