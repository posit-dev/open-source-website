{{ define "main" }}
<div class="flex flex-col w-full max-w-7xl mx-auto" data-pagefind-ignore>
  <div class="mt-6 mb-8">
    <h1 class="text-4xl font-medium text-gray-500">
      {{ .Title }}
    </h1>
  </div>

  {{ $cfg := site.Data.filters.tags }}

  {{ partial "filter-controls.html" $cfg }}

  <div data-card-container data-filter-config='{{ $cfg | jsonify }}'
       class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    {{- range .Pages.ByDate.Reverse -}}
      {{ partial "item.html" (dict "page" .) }}
    {{- end -}}
  </div>
</div>
{{ end }}
