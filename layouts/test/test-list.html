{{ define "main" }}
<div class="flex flex-col w-full max-w-7xl mx-auto">
  <h1 class="text-4xl font-medium text-gray-500 mb-4">{{ .Title }}</h1>
  <ul>
    {{ range .Pages }}
    <li><a href="{{ .RelPermalink }}" class="text-blue-600 hover:underline">{{ .Title }}</a></li>
    {{ end }}
  </ul>
</div>
{{ end }}
