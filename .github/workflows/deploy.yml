name: Build and Deploy to Netlify

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      deploy-url: ${{ steps.netlify.outputs.deploy-url }}
      has-content-changes: ${{ steps.detect-content.outputs.has-changes }}
      changed-content: ${{ steps.detect-content.outputs.changed }}
    env:
      HUGO_VERSION: 0.158.0
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Hugo
        run: |
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb" -O hugo.deb
          sudo dpkg -i hugo.deb
          rm hugo.deb

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build-tailwind

      - name: Cache Hugo resources
        uses: actions/cache@v5
        with:
          path: resources
          key: hugo-resources-${{ github.run_id }}
          restore-keys: |
            hugo-resources-

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --templateMetrics --templateMetricsHints
      - name: Build search index
        run: npm run build-search

      - name: Deploy to Netlify
        id: netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './public'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 15

      - name: Detect content changes
        if: github.event_name == 'pull_request'
        id: detect-content
        run: |
          git fetch origin main --depth=1
          CHANGED=$(git diff --name-only origin/main -- 'content/' \
            | { grep -E '/_?index\.(md|qmd|ipynb|Rmd)$' || true; })

          if [ -z "$CHANGED" ]; then
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "changed<<$EOF" >> "$GITHUB_OUTPUT"
            echo "$CHANGED" >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          fi

  preview-links:
    needs: build-and-deploy
    if: needs.build-and-deploy.outputs.has-content-changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      HUGO_VERSION: 0.158.0
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Hugo
        run: |
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb" -O hugo.deb
          sudo dpkg -i hugo.deb
          rm hugo.deb

      - name: Build preview links
        id: links
        env:
          DEPLOY_URL: ${{ needs.build-and-deploy.outputs.deploy-url }}
          CHANGED_CONTENT: ${{ needs.build-and-deploy.outputs.changed-content }}
        run: |
          # Get source path → permalink mapping from Hugo
          hugo list all > /tmp/hugo-pages.csv
          BASE_URL=$(grep '^baseURL' hugo.toml | sed "s/.*= *['\"]//;s/['\"]//")

          LINKS=""
          while IFS= read -r SRC; do
            [ -z "$SRC" ] && continue
            PERMALINK=$(grep "^$SRC," /tmp/hugo-pages.csv | cut -d',' -f8)
            if [ -n "$PERMALINK" ]; then
              URL_PATH="${PERMALINK#$BASE_URL}"
              LINKS="$LINKS- [$URL_PATH]($DEPLOY_URL$URL_PATH)"$'\n'
            fi
          done <<< "$CHANGED_CONTENT"

          if [ -z "$LINKS" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"

          BLOG_LINE=""
          if echo "$CHANGED_CONTENT" | grep -q '^content/blog/'; then
            BLOG_LINE="**Blog listing:** [$DEPLOY_URL/blog/]($DEPLOY_URL/blog/)"$'\n'
          fi

          cat > /tmp/preview-comment.md <<EOF
          ## Preview links

          $LINKS
          ${BLOG_LINE}**Full site:** [$DEPLOY_URL]($DEPLOY_URL)
          EOF

      - name: Post preview comment
        if: steps.links.outputs.found == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: content-preview-links
          path: /tmp/preview-comment.md
