name: Build and Deploy to Netlify

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to check out. Defaults to the SHA that triggered the workflow."
        type: string
        default: ""
      hugo-flags:
        description: "Extra flags for the Hugo build command (e.g. --buildFuture)"
        type: string
        default: ""
      deploy-context:
        description: "'production' or 'preview'"
        type: string
        required: true
    secrets:
      NETLIFY_AUTH_TOKEN:
        required: true
      NETLIFY_SITE_ID:
        required: true
    outputs:
      deploy-url:
        description: "Netlify deploy URL"
        value: ${{ jobs.build-and-deploy.outputs.deploy-url }}
      hugo-version:
        description: "Hugo version used for the build"
        value: ${{ jobs.build-and-deploy.outputs.hugo-version }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    outputs:
      deploy-url: ${{ steps.netlify.outputs.deploy-url }}
      hugo-version: ${{ steps.hugo-version.outputs.version }}
    env:
      HUGO_VERSION: 0.158.0
    steps:
      - name: Expose Hugo version
        id: hugo-version
        run: echo "version=${HUGO_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Hugo
        run: |
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb" -O hugo.deb
          sudo dpkg -i hugo.deb
          rm hugo.deb

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build Tailwind CSS
        run: yarn build-tailwind

      - name: Cache Hugo resources
        uses: actions/cache@v5
        with:
          path: resources
          key: hugo-resources-${{ github.run_id }}
          restore-keys: |
            hugo-resources-

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_PROCESS_IMAGES: "true"
        run: hugo --templateMetrics --templateMetricsHints ${{ inputs.hugo-flags }}

      - name: Build search index
        run: yarn build-search

      - name: Deploy to Netlify
        id: netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './public'
          production-deploy: ${{ inputs.deploy-context == 'production' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
          enable-pull-request-comment: ${{ inputs.deploy-context == 'preview' }}
          enable-commit-comment: false
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 15
