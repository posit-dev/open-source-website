name: Validate Blog Posts

on:
  pull_request:
    paths:
      - 'content/blog/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Find changed blog posts
        id: changed
        run: |
          # On pull_request events, HEAD is the merge commit.
          # HEAD~1 is the base branch tip, so this diff gives
          # exactly the PR's changes.
          CHANGED=$(git diff --name-only HEAD~1 -- 'content/blog/**/index.md' \
            | { grep -E '/index\.md$' || true; })

          if [ -z "$CHANGED" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "files<<$EOF" >> "$GITHUB_OUTPUT"
            echo "$CHANGED" >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.changed.outputs.found == 'true'
        uses: astral-sh/setup-uv@v6

      - name: Run validation
        if: steps.changed.outputs.found == 'true'
        id: validate
        run: |
          EXIT_CODE=0
          OUTPUT=$(uv run scripts/validate-blog-posts.py ${{ steps.changed.outputs.files }} 2>&1) || EXIT_CODE=$?

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "output<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
          echo "exit-code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Post results comment
        if: steps.changed.outputs.found == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: blog-validation
          message: |
            ## Blog post validation

            ```
            ${{ steps.validate.outputs.output }}
            ```

            ${{ steps.validate.outputs.exit-code == '0' && '✅ All checks passed.' || '❌ Some checks failed. Please review the errors above.' }}

      - name: Fail on errors
        if: steps.validate.outputs.exit-code != '0' && steps.changed.outputs.found == 'true'
        run: exit 1
